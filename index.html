<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>BetAnalytics Pro V4</title>
<meta name="theme-color" content="#050810">
<style>
:root{--bg:#050810;--panel:#0c1120;--card:#111827;--text:#f0f4ff;--muted:#8fa3c0;--blue:#3b82f6;--cyan:#22d3ee;--green:#10b981;--red:#ef4444;--border:rgba(255,255,255,.08)}
*{box-sizing:border-box}body{margin:0;font-family:Inter,system-ui,Arial,sans-serif;color:var(--text);background:radial-gradient(circle at 15% 0%,rgba(34,211,238,.08),transparent 24%),radial-gradient(circle at 85% 0%,rgba(59,130,246,.08),transparent 24%),var(--bg)}
body:before{content:'';position:fixed;inset:0;pointer-events:none;opacity:.04;background:repeating-linear-gradient(to bottom,rgba(255,255,255,.15),rgba(255,255,255,.15) 1px,transparent 2px,transparent 4px)}
.app{position:relative;z-index:1;max-width:1380px;margin:0 auto;padding:18px 16px 100px}.top{position:sticky;top:0;z-index:10;background:rgba(5,8,16,.88);backdrop-filter:blur(16px);border-bottom:1px solid var(--border)}.top-inner{max-width:1380px;margin:0 auto;padding:14px 16px 12px;display:grid;gap:12px}.brand{display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap}.logo{font:800 30px/1 system-ui,Arial,sans-serif;letter-spacing:.02em;background:linear-gradient(90deg,#8dd9ff,#3b82f6 45%,#8b5cf6);-webkit-background-clip:text;-webkit-text-fill-color:transparent}.sub{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.12em}.row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}.pill{display:inline-flex;align-items:center;gap:8px;padding:8px 12px;border-radius:999px;border:1px solid var(--border);background:rgba(255,255,255,.03)}.dot{width:10px;height:10px;border-radius:50%;background:var(--green);box-shadow:0 0 12px rgba(16,185,129,.6);animation:pulse 1.6s infinite}.tabs{display:flex;gap:10px;overflow:auto;padding-bottom:2px}.tab{border:1px solid transparent;background:transparent;color:var(--muted);padding:11px 14px;border-radius:14px;font-weight:800;cursor:pointer;white-space:nowrap}.tab.active{color:var(--text);background:rgba(59,130,246,.12);border-color:rgba(59,130,246,.28)}.view{display:none}.view.active{display:block;animation:fade .2s ease}.grid{display:grid;gap:14px}.g4{grid-template-columns:repeat(4,minmax(0,1fr))}.g3{grid-template-columns:repeat(3,minmax(0,1fr))}.g2{grid-template-columns:repeat(2,minmax(0,1fr))}.card{background:linear-gradient(180deg,rgba(17,24,39,.95),rgba(12,17,32,.92));border:1px solid var(--border);border-radius:22px;padding:18px;box-shadow:0 12px 28px rgba(0,0,0,.22)}.label{font-size:11px;color:var(--muted);letter-spacing:.12em;text-transform:uppercase}.big{font-size:28px;font-weight:800;margin-top:8px}.muted{color:var(--muted)}.list{display:grid;gap:10px}.item{padding:12px 0;border-top:1px solid rgba(255,255,255,.06)}.item:first-child{border-top:0;padding-top:0}.badge{display:inline-block;padding:5px 10px;border-radius:999px;font-size:11px;font-weight:800;border:1px solid var(--border)}.ok{background:rgba(16,185,129,.14);color:#cbffe0}.bad{background:rgba(239,68,68,.14);color:#ffd0d0}.wait{background:rgba(99,102,241,.14);color:#d6d6ff}.meter{height:10px;border-radius:999px;background:rgba(255,255,255,.06);overflow:hidden;margin-top:10px}.fill{height:100%;border-radius:999px;background:linear-gradient(90deg,#8b5cf6,#22d3ee)}.table{overflow:auto;border-radius:18px;border:1px solid var(--border)}table{width:100%;min-width:720px;border-collapse:collapse}th,td{padding:12px 14px;border-bottom:1px solid rgba(255,255,255,.06);text-align:left}th{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em}.empty{padding:18px;border-radius:18px;border:1px dashed rgba(255,255,255,.14);color:var(--muted)}.warn{background:rgba(245,158,11,.12);border-color:rgba(245,158,11,.22)}.chart{height:220px}.chart svg{width:100%;height:100%}.bottom{position:fixed;left:0;right:0;bottom:0;display:none;grid-template-columns:repeat(4,1fr);gap:8px;padding:8px 10px calc(8px + env(safe-area-inset-bottom,0px));background:rgba(5,8,16,.92);backdrop-filter:blur(16px);border-top:1px solid var(--border)}.bottom button{padding:10px 8px;border-radius:14px;border:1px solid var(--border);background:rgba(255,255,255,.03);color:var(--muted);font-weight:800}.bottom button.active{color:var(--text);border-color:rgba(59,130,246,.28)}@keyframes fade{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}@keyframes pulse{50%{opacity:.55;transform:scale(.86)}}@media(max-width:980px){.g4,.g3,.g2{grid-template-columns:1fr}}@media(max-width:760px){.bottom{display:grid}}</style>
</head>
<body>
<div class="top"><div class="top-inner"><div class="brand"><div><div class="logo">BA PRO V4</div><div class="sub">Sports Analytics Engine</div></div><div class="row"><div class="pill"><span class="dot"></span><strong>LIVE DATA</strong><span id="updatedAt" class="muted">-</span></div><div class="pill">Health <strong id="health">-</strong></div></div></div><div class="tabs" id="tabs"></div></div></div>
<div class="app">
  <section id="dashboard" class="view active"></section>
  <section id="cota2" class="view"></section>
  <section id="top3" class="view"></section>
  <section id="live" class="view"></section>
  <section id="setup" class="view"></section>
</div>
<div class="bottom" id="bottom"></div>
<script>
const tabs=[['dashboard','Dashboard'],['cota2','Cota 2'],['top3','Top 3'],['live','Live'],['setup','Setup']];
const state={meta:null,top3:null,cota2:null,live:[],recs:[],predictions:[]};
const q=s=>document.querySelector(s);
const fmt=n=>Number(n||0).toLocaleString('ro-RO',{maximumFractionDigits:2});
const pct=n=>`${fmt(n)}%`;
async function j(url){try{const r=await fetch(url,{cache:'no-store'});if(!r.ok)return null;return await r.json()}catch{return null}}
function badgeClass(s){s=String(s||'pending').toLowerCase();return s==='win'?'ok':s==='lose'?'bad':'wait'}
function bar(p){return `<div class="meter"><div class="fill" style="width:${Math.max(0,Math.min(100,Number(p||0)))}%"></div></div>`}
function nav(){const html=tabs.map(([id,l],i)=>`<button class="tab ${i===0?'active':''}" data-id="${id}">${l}</button>`).join('');q('#tabs').innerHTML=html;q('#bottom').innerHTML=tabs.slice(0,4).map(([id,l],i)=>`<button class="${i===0?'active':''}" data-id="${id}">${l}</button>`).join('')+`<button data-id="setup">Setup</button>`;document.querySelectorAll('[data-id]').forEach(b=>b.onclick=()=>show(b.dataset.id));}
function show(id){document.querySelectorAll('.view').forEach(v=>v.classList.toggle('active',v.id===id));document.querySelectorAll('.tab').forEach(b=>b.classList.toggle('active',b.dataset.id===id));document.querySelectorAll('#bottom button').forEach(b=>b.classList.toggle('active',b.dataset.id===id));}
function chart(values){if(!values.length)return '<div class="empty">Nu există suficiente rezultate pentru grafic.</div>';const W=760,H=220,P=24,max=Math.max(...values,1),min=Math.min(...values,0),span=Math.max(max-min,1);const pts=values.map((y,i)=>{const x=P+(i*(W-P*2))/Math.max(values.length-1,1);const yy=H-P-((y-min)/span)*(H-P*2);return [x,yy]});const line=pts.map((p,i)=>(i?'L':'M')+p[0].toFixed(1)+','+p[1].toFixed(1)).join(' ');const area=`${line} L ${pts.at(-1)[0]} ${H-P} L ${pts[0][0]} ${H-P} Z`;return `<div class="chart"><svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="none"><defs><linearGradient id="g" x1="0" x2="0" y1="0" y2="1"><stop offset="0%" stop-color="rgba(34,211,238,.34)"/><stop offset="100%" stop-color="rgba(34,211,238,0)"/></linearGradient></defs><path d="${area}" fill="url(#g)"></path><path d="${line}" fill="none" stroke="#22d3ee" stroke-width="3" stroke-linecap="round"></path></svg></div>`}
function recStats(){const rows=(state.recs||[]).filter(r=>['win','lose'].includes(String(r.status||'').toLowerCase()));const wins=rows.filter(r=>String(r.status).toLowerCase()==='win').length;const profit=rows.reduce((a,r)=>a+Number(r.profit_units||r.profit||0),0);return {rows,wins,losses:rows.length-wins,wr:rows.length?wins*100/rows.length:0,profit};}
function renderDashboard(){const s=recStats();const values=(state.recs||[]).filter(r=>['win','lose'].includes(String(r.status||'').toLowerCase())).map(r=>Number(r.profit_units||r.profit||0)).reduce((a,v)=>{a.push((a.at(-1)||0)+v);return a;},[]);q('#dashboard').innerHTML=`<div class="grid g4"><div class="card"><div class="label">Predicții</div><div class="big">${fmt(state.meta?.predictions_count||state.predictions?.length||0)}</div></div><div class="card"><div class="label">Win Rate</div><div class="big">${pct(s.wr)}</div></div><div class="card"><div class="label">Profit Unități</div><div class="big">${fmt(s.profit)}</div></div><div class="card"><div class="label">Live Events</div><div class="big">${fmt(state.live?.length||0)}</div></div></div><div class="grid g2"><div class="card"><div class="label">Evoluție</div>${chart(values)}</div><div class="card"><div class="label">Status Build</div><div style="margin-top:12px" class="list"><div><strong>Versiune:</strong> <span class="muted">${state.meta?.version||'bootstrap'}</span></div><div><strong>Source:</strong> <span class="muted">${state.meta?.source||'repo setup'}</span></div><div><strong>Evenimente:</strong> <span class="muted">${fmt(state.meta?.events_count||0)}</span></div><div><strong>BSD status:</strong> <span class="muted">${state.meta?.status||'pending'}</span></div></div></div></div>`}
function renderTop3(){const rows=state.top3?.predictions||[];q('#top3').innerHTML=`<div class="card"><div class="label">Top 3 Predicții Zilnice</div><h2 style="margin:8px 0 6px">${state.top3?.date||'-'}</h2>${rows.length?`<div class="list">${rows.map((r,i)=>`<div class="item"><div class="label">Rank #${i+1} · ${r.league||'-'}</div><div style="font-size:20px;font-weight:800;margin-top:6px">${r.home||'-'} vs ${r.away||'-'}</div><div class="muted" style="margin-top:6px">${r.market||'-'} · Cotă ${fmt(r.odds)} · Conf ${pct(r.confidence)}</div>${bar(r.adjusted_prob)}<div class="row" style="margin-top:10px"><span class="badge wait">EV ${pct((r.value||0)*100)}</span><span class="badge wait">Edge ${pct(r.edge_pct)}</span><span class="badge wait">Prob ${pct(r.adjusted_prob)}</span></div></div>`).join('')}</div>`:`<div class="empty warn">Nu există încă top3_daily.json sau nu are selecții. Rulează workflow-ul după ce setezi BSD_TOKEN.</div>`}</div>`}
function renderCota2(){const rows=state.cota2?.tickets||[];q('#cota2').innerHTML=`<div class="card"><div class="label">Biletul Zilei Cota 2</div><h2 style="margin:8px 0 6px">${state.cota2?.date||'-'}</h2>${rows.length?rows.map((t,idx)=>`<div class="item"><div class="row" style="justify-content:space-between"><strong>${idx===0?'Primar':idx===1?'Secundar':'Terțiar'}</strong><span class="badge ${badgeClass(t.status)}">${String(t.status||'pending').toUpperCase()}</span></div><div class="muted" style="margin-top:8px">Cotă totală ${fmt(t.total_odds)} · Prob combinată ${pct(t.combined_prob)} · EV ${pct((t.combined_ev||0)*100)}</div><div class="list" style="margin-top:8px">${(t.legs||[]).map(l=>`<div class="item"><strong>${l.home||'-'} vs ${l.away||'-'}</strong><div class="muted">${l.market||'-'} · Cotă ${fmt(l.odds)} · Prob ${pct(l.adjusted_prob)}</div></div>`).join('')}</div></div>`).join(''):`<div class="empty warn">Nu există încă cota2_daily.json sau nu are bilete generate.</div>`}</div>`}
function renderLive(){const rows=(state.live||[]).slice(0,20);q('#live').innerHTML=`<div class="card"><div class="label">Live Center</div><h2 style="margin:8px 0 6px">Meciuri în desfășurare</h2>${rows.length?`<div class="table"><table><thead><tr><th>Liga</th><th>Meci</th><th>Status</th><th>Scor</th><th>Min</th></tr></thead><tbody>${rows.map(r=>`<tr><td>${r.league?.name||r.league||'-'}</td><td>${r.home_team||r.home||'-'} vs ${r.away_team||r.away||'-'}</td><td>${r.status||'-'}</td><td>${r.home_score??'-'} - ${r.away_score??'-'}</td><td>${r.current_minute??'-'}</td></tr>`).join('')}</tbody></table></div>`:`<div class="empty">Nu există live.json sau nu sunt meciuri live acum.</div>`}</div>`}
function renderSetup(){q('#setup').innerHTML=`<div class="grid g2"><div class="card"><div class="label">Ce mai trebuie făcut</div><div class="list" style="margin-top:10px"><div class="item"><strong>1. GitHub Secret</strong><div class="muted">Settings → Secrets and variables → Actions → New repository secret → BSD_TOKEN</div></div><div class="item"><strong>2. Workflow</strong><div class="muted">Rulează manual workflow-ul Fetch BetAnalytics Data după ce adaugi secretul.</div></div><div class="item"><strong>3. Pages</strong><div class="muted">Settings → Pages → Deploy from a branch → main / root.</div></div></div></div><div class="card"><div class="label">Verificare date</div><div class="list" style="margin-top:10px"><div class="item"><strong>meta.json:</strong> <span class="muted">${state.meta?'OK':'Lipsește'}</span></div><div class="item"><strong>top3_daily.json:</strong> <span class="muted">${state.top3?'OK':'Lipsește'}</span></div><div class="item"><strong>cota2_daily.json:</strong> <span class="muted">${state.cota2?'OK':'Lipsește'}</span></div><div class="item"><strong>live.json:</strong> <span class="muted">${Array.isArray(state.live)?'OK':'Lipsește'}</span></div></div></div></div>`}
async function boot(){nav();const [meta,top3,cota2,live,recs,preds]=await Promise.all([j('data/meta.json'),j('data/top3_daily.json'),j('data/cota2_daily.json'),j('data/live.json'),j('data/recommendation_log.json'),j('data/predictions.json')]);state.meta=meta;state.top3=top3;state.cota2=cota2;state.live=live||[];state.recs=recs||[];state.predictions=preds||[];q('#updatedAt').textContent=meta?.updated_at||'no data';q('#health').textContent=meta?.status||'pending';renderDashboard();renderTop3();renderCota2();renderLive();renderSetup();}
boot();
</script>
</body>
</html>
